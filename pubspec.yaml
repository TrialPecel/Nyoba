name: gallery_app
description: A modern Flutter Gallery app with smooth animations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.14.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.18.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
